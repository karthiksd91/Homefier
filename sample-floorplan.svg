<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#ffffff"/>

  <!-- Outer walls - 6px stroke for clear detection -->
  <rect x="100" y="80" width="600" height="420" fill="none" stroke="#222222" stroke-width="6"/>

  <!-- Horizontal dividers -->
  <line x1="100" y1="280" x2="700" y2="280" stroke="#222222" stroke-width="5"/>

  <!-- Vertical divider - top row: Living Room | Kitchen -->
  <line x1="380" y1="80" x2="380" y2="280" stroke="#222222" stroke-width="5"/>

  <!-- Vertical divider - bottom row: Bedroom | Bath+Hall -->
  <line x1="430" y1="280" x2="430" y2="500" stroke="#222222" stroke-width="5"/>

  <!-- Bathroom wall (horizontal) -->
  <line x1="430" y1="390" x2="700" y2="390" stroke="#222222" stroke-width="5"/>

  <!-- Room labels -->
  <text x="230" y="190" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle" font-weight="bold">Living Room</text>
  <text x="540" y="190" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle" font-weight="bold">Kitchen</text>
  <text x="250" y="400" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle" font-weight="bold">Bedroom</text>
  <text x="565" y="450" font-family="Arial,sans-serif" font-size="16" fill="#666" text-anchor="middle" font-weight="bold">Bathroom</text>
  <text x="565" y="340" font-family="Arial,sans-serif" font-size="16" fill="#666" text-anchor="middle" font-weight="bold">Hallway</text>

  <!-- Dimension labels -->
  <!-- Top: total width -->
  <line x1="100" y1="55" x2="700" y2="55" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="50" x2="100" y2="60" stroke="#999" stroke-width="1"/>
  <line x1="700" y1="50" x2="700" y2="60" stroke="#999" stroke-width="1"/>
  <text x="400" y="48" font-family="Arial,sans-serif" font-size="14" fill="#555" text-anchor="middle">12 m</text>

  <!-- Left: total height -->
  <line x1="75" y1="80" x2="75" y2="500" stroke="#999" stroke-width="1"/>
  <line x1="70" y1="80" x2="80" y2="80" stroke="#999" stroke-width="1"/>
  <line x1="70" y1="500" x2="80" y2="500" stroke="#999" stroke-width="1"/>
  <text x="60" y="295" font-family="Arial,sans-serif" font-size="14" fill="#555" text-anchor="middle" transform="rotate(-90,60,295)">8.4 m</text>

  <!-- Top rooms height -->
  <line x1="725" y1="80" x2="725" y2="280" stroke="#999" stroke-width="1"/>
  <line x1="720" y1="80" x2="730" y2="80" stroke="#999" stroke-width="1"/>
  <line x1="720" y1="280" x2="730" y2="280" stroke="#999" stroke-width="1"/>
  <text x="748" y="185" font-family="Arial,sans-serif" font-size="12" fill="#888" text-anchor="middle" transform="rotate(-90,748,185)">4 m</text>

  <!-- Living room width -->
  <line x1="100" y1="295" x2="380" y2="295" stroke="#aaa" stroke-width="0.8"/>
  <text x="240" y="310" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">5.6 m</text>

  <!-- Kitchen width -->
  <line x1="380" y1="295" x2="700" y2="295" stroke="#aaa" stroke-width="0.8"/>
  <text x="540" y="310" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">6.4 m</text>

  <!-- Bedroom height -->
  <line x1="415" y1="280" x2="415" y2="500" stroke="#aaa" stroke-width="0.8"/>
  <text x="405" y="395" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle" transform="rotate(-90,405,395)">4.4 m</text>
</svg>
